<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Multi Chat</title>
  <script type="text/javascript">
    // SPA 路由回退脚本 - GitHub Pages 支持
    // 当用户直接访问子路由时，GitHub Pages 会返回 404
    // 此脚本将路径保存到 sessionStorage，然后重定向到根路径
    // 根路径的 index.html 会读取 sessionStorage 并恢复原始路径
    
    (function() {
      // 获取当前路径（不包括域名）
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // 保存完整路径到 sessionStorage
      // 格式: { path: '/multi-chat/chat', search: '?...', hash: '#...' }
      var redirectPath = path + search + hash;
      sessionStorage.setItem('gh-pages-redirect', redirectPath);
      
      // 重定向到根路径
      // 保留域名部分，只替换路径
      var basePath = '/multi-chat/';
      window.location.replace(basePath);
    })();
  </script>
</head>
<body>
  <p>正在重定向...请稍候</p>
</body>
</html>
